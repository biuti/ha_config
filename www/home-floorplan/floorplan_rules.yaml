# /config/www/home-floorplan/floorplan_rules.yaml

- name: "Algoritmo Parametrico Isolamento Livelli"
  entities:
    - sun.sun # Usato come trigger di spinta al boot
  element:
    - layer_seminterrato
    - layer_piano_terra
    - layer_piano_primo
    - layer_tetto
  state_action:
    action: call-service
    service: floorplan.class_set
    service_data: >
      ${
        (() => {
          console.log("[STEP 2] - Entrato in floorplan_rules.yaml (Regola Livelli)");
          const targetFloor = config.vars.current_floor;
          const currentLayerName = element.id.replace('layer_', '');
          
          console.log(`[PARAMETRIC] Analizzo macro-layer: ${element.id} | Target della card: layer_${targetFloor}`);
          
          // Se il nome del layer corrisponde alla variabile della card, lo mostra. Altrimenti lo inibisce.
          return (currentLayerName === targetFloor) ? "layer-visible" : "layer-hidden";
        })()
      }

- name: "Algoritmo Parametrico Giorno/Notte Immagini"
  entities:
    - sun.sun
  element:
    - seminterrato_img
    - seminterrato_bg_night
    - piano_terra_img
    - piano_terra_bg_night
    - piano_primo_img
    - piano_primo_bg_night
    - tetto_img
    - tetto_bg_night
  state_action:
    action: call-service
    service: floorplan.class_set
    service_data: >
      ${
        (() => {
          console.log("[STEP 3] - Entrato in floorplan_rules.yaml (Regola Sole)");
          const sole = states['sun.sun'].state;
          const targetFloor = config.vars.current_floor;

          // Capisce a quale piano appartiene l'immagine corrente (es. "seminterrato_img" -> "seminterrato")
          const imageFloor = element.id.replace('_img', '').replace('_bg_night', '');

          console.log(`[LOGICA SOLE] Immagine: ${element.id} | Sole: ${sole} | Target: ${targetFloor}`);

          // Se questa immagine appartiene a un piano DIVERSO da quello visualizzato nella card, spengila subito
          if (imageFloor !== targetFloor) {
            return "layer-hidden";
          }
          
          // Se appartiene al piano attivo, discrimina in base al sole
          if (sole === 'above_horizon' && element.id.endsWith('_bg_night')) return "layer-hidden";
          if (sole === 'below_horizon' && element.id.endsWith('_img')) return "layer-hidden";
          
          console.log(`[PARAMETRIC IMAGE] Mostro immagine corretta: ${element.id} per il piano: ${imageFloor}`);
          return "layer-visible";
        })()
      }


