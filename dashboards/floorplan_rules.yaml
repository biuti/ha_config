- name: Master Layer Controller
  entities:
    - sun.sun
  element:
    - layer_garage
    - layer_seminterrato
    - layer_piano_terra
    - layer_piano_primo
    - layer_tetto
  state_action:
    action: call-service
    service: floorplan.class_set
    service_data: >
      ${
        if (!element || !element.id) return null;

        const currentFloor = (vars && vars.current_floor) ? vars.current_floor : 'seminterrato';
        const layerId = element.id.replace('layer_', '').replaceAll('_', '-');

        return (layerId === currentFloor) ? "layer-visible" : "layer-hidden";
      }

- name: Gestione Ciclo Giorno Notte via Label
  entities:
    - sun.sun
  class: render-img 
  state_action:
    action: call-service
    service: floorplan.class_set
    service_data: >
      ${
        // 1. Controllo difensivo in cima
        if (!element || !document.getElementById(element.id)) return;

        // 2. Controllo di contesto: Se l'immagine si trova dentro un layer che non è quello attivo, nascondila a prescindere dal sole!
        const currentPath = (config && config.vars && config.vars.current_floor) ? config.vars.current_floor : 'seminterrato';
        
        // Risaliamo l'albero del DOM dell'SVG per vedere se questa immagine è figlia di un layer disattivato
        const parentLayer = element.closest('[id^="layer_"]');
        if (parentLayer) {
          const parentLayerId = parentLayer.id.replace('layer_', '').replaceAll('_', '-');
          if (parentLayerId !== currentPath) {
            return "render-hidden"; // Forza il PNG a nascondersi se il piano è sbagliato
          }
        }

        // 3. Se siamo nel piano corretto, applichiamo la logica giorno/notte standard
        const isNight = (entity.state === "below_horizon");
        const label = element.getAttribute('inkscape:label');

        if (!label) return "render-hidden"; 
        if (label === "notte") {
          return isNight ? "render-visible" : "render-hidden";
        } else if (label === "giorno") {
          return isNight ? "render-hidden" : "render-visible";
        }
        return "render-hidden";
      }

# LUCI (Elementi interattivi)
- name: Lights
  entities:
    - domain: light
  element: ${entity.entity_id.replace('.', '_')}
  tap_action: toggle
  state_action:
    action: call-service
    service: floorplan.class_set
    service_data: >
      ${ 
        if (!element || !document.getElementById(element.id)) return;

        return entity.state === 'on' ? 'light-on' : 'light-off';
      }

# TEMPERATURE (Label di testo)
- name: Temperature Sensors
  entities:
    - domain: sensor
  element: >
    ${
      /temp|temperature/i.test(entity.entity_id)
        ? entity.entity_id.replace('.', '_')
        : null
    }
  state_action:
    action: floorplan.text_set
    text: >
      ${ entity.state + " °C" }
  class_set: temp-label

# RAFFSTORE E CANCELLI (Linee Penna Bezier)
- name: Covers
  entities:
    - domain: cover
  element: ${entity.entity_id.replace('.', '_')}
  tap_action: more-info
  state_action:
    action: call-service
    service: floorplan.class_set
    service_data: >
      ${
        if (!element || !element.id) return null;

        if (entity.state === "opening" || entity.state === "closing")
          return "cover-moving";

        if (entity.state === "open")
          return "cover-open";

        return "cover-closed";
      }

# SENSORI DI STATO (Elementi con label "porta" e "finestra")
- name: Binary Sensors
  entities:
    - domain: binary_sensor
  element: ${entity.entity_id.replace('.', '_')}
  state_action:
    action: call-service
    service: floorplan.class_set
    service_data: >
      ${
        if (!element || !element.id) return null;

        return entity.state === 'on' ? 'sensor-on' : 'sensor-off';
      }