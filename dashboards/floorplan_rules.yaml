# dashboards/floorplan_rules.yaml

- name: "Logica X: Isolamento Strutturale"
  entities:
    - sun.sun

  element:
    - layer_seminterrato
    - layer_piano_terra
    - layer_piano_primo
    - layer_tetto
    - layer_garage

  state_action:
    action: call-service
    service: floorplan.class_set

    service_data: >
      ${
        window.location.pathname.includes(element.getAttribute('data-floor'))
          ? 'layer-visible'
          : 'layer-hidden'
      }

- name: "Logica SOLE: Filtro Immagini Giorno Notte"
  entities:
    - sensor.sun_phase

  element:
    - garage_img_day
    - garage_img_night
    - seminterrato_img_day
    - seminterrato_img_night
    - piano_terra_img_day
    - piano_terra_img_night
    - piano_primo_img_day
    - piano_primo_img_night
    - tetto_img_day
    - tetto_img_night

  state_action:
    action: call-service
    service: floorplan.class_set
    service_data: >
      ${
        entity.state === element.getAttribute('data-mode')
          ? 'render-visible'
          : 'render-hidden'
      }

