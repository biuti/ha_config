# dashboards/floorplan_rules.yaml

- name: "Logica X: Isolamento Strutturale"
  entities:
    - sun.sun
  element:
    - layer_seminterrato
    - layer_piano_terra
    - layer_piano_primo
    - layer_tetto
  state_action:
    action: call-service
    service: floorplan.class_set
    service_data: >
      ${
        element.id === 'layer_seminterrato'
          ? 'layer-visible'
          : 'layer-hidden'
      }

- name: "Logica SOLE: Filtro Immagini Giorno Notte"
  entities:
    - sun.sun
  element:
    - seminterrato_img
    - seminterrato_bg_night
    - piano_terra_img
    - piano_terra_bg_night
    - piano_primo_img
    - piano_primo_bg_night
    - tetto_img
    - tetto_bg_night
  state_action:
    action: call-service
    service: floorplan.class_set
    service_data: layer-visible

- name: TEST
  entities:
    - sun.sun

  element:
    - layer_seminterrato

  state_action:
    action: call-service
    service: floorplan.class_set
    service_data: layer-hidden

