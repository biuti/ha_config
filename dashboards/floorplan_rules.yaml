# SENSORI
- name: Sensori Apertura
  entities:
    - binary_sensor.pf_taverna
    - binary_sensor.fin_bagno_taverna
    - binary_sensor.fin_lavanderia
    - binary_sensor.porta_seminterrato
    - binary_sensor.porta_piano_terra
    - binary_sensor.pf_camera_padronale
    - binary_sensor.fin_bagno_padronale
    - binary_sensor.fin_bagno_comune
    - binary_sensor.fin_studio
    - binary_sensor.pf_camera_ospiti
    - binary_sensor.pf_soggiorno
    - binary_sensor.pf_cucina
    - binary_sensor.fin_cucina
    - binary_sensor.porta_garage
    - binary_sensor.cancello_pedonale

  tap_action: more-info

  state_action:
    action: call-service
    service: floorplan.dataset_set
    service_data:
      key: state
      value: ${entity.state}

# GARAGE E CANCELLI
- name: Covers Garage

  entities:
    - cover.garage_est
    - cover.garage_ovest
    - cover.cancello_carrabile

  state_action:
    action: call-service
    service: floorplan.dataset_set
    service_data:
      key: status
      value: ${entity.state}

# Raffstore
- name: Raffstore State

  entities:
    - cover.raffstore_pf_taverna
    - cover.raffstore_fin_bagno_taverna
    - cover.raffstore_fin_vano_scale_pt
    - cover.raffstore_fin_vano_scale_p1
    - cover.raffstore_pf_camera_padronale
    - cover.raffstore_fin_bagno_padronale
    - cover.raffstore_fin_bagno_comune
    - cover.raffstore_fin_studio
    - cover.raffstore_pf_camera_ospiti
    - cover.raffstore_pf_soggiorno
    - cover.raffstore_fin_soggiorno_ovest
    - cover.raffstore_fin_soggiorno_est
    - cover.raffstore_pf_cucina
    - cover.raffstore_fin_cucina
    - cover.raffstore_fin_bagno_p1

  state_action:
    - action: call-service
      service: floorplan.dataset_set
      service_data:
        key: state
        value: ${entity.state}

    - action: call-service
      service: floorplan.dataset_set
      service_data:
        key: position
        value: ${entity.attributes.current_position}

# TEMPERATURA
- name: Temperatura Interna

  entities:
    - sensor.temperatura_taverna
    - sensor.temperatura_camera_padronale
    - sensor.temperatura_soggiorno

  state_action:
    - service: floorplan.text_set
      service_data: '${parseFloat(entity.state).toFixed(1) + "°"}'

- name: Temperatura Esterna
  entities:
    - sensor.temperatura_esterna

  state_action:
    - service: floorplan.text_set
      service_data: '${parseFloat(entity.state).toFixed(1) + "°"}'

- name: Meteo Icona

  entities:
    - sensor.meteo_attuale

  state_action:
    - service: floorplan.text_set
      service_data: >
        ${
          {
            "sunny":"☀️",
            "partlycloudy":"⛅",
            "cloudy":"☁️",
            "rainy":"🌧️",
            "pouring":"🌧️",
            "snowy":"❄️",
            "fog":"🌫️",
            "windy":"💨",
            "lightning":"⚡"
          }[entity.state] || "?"
        }

- name: Vento
  entities:
    - sensor.vento

  state_action:
    - service: floorplan.text_set
      service_data: '${entity.state}'

- name: Umidita Esterna

  entities:
    - sensor.umidita_esterna

  state_action:
    - service: floorplan.text_set
      service_data: '${entity.state + "%"}'