# dashboards/floorplan_rules.yaml

- name: "Logica X: Isolamento Strutturale"
  entities:
    - sun.sun
  element:
    - layer_seminterrato
    - layer_piano_terra
    - layer_piano_primo
    - layer_tetto
    - layer_garage

  state_action:
    action: call-service
    service: floorplan.class_set

    service_data: >
      ${
        window.location.pathname.includes(element.getAttribute('data-floor'))
          ? 'layer-visible'
          : 'layer-hidden'
      }

- name: "Logica SOLE: Filtro Immagini Giorno Notte"
  entities:
    - sensor.sun_phase
  element:
    - garage_img_day
    - garage_img_night
    - seminterrato_img_day
    - seminterrato_img_night
    - piano_terra_img_day
    - piano_terra_img_night
    - piano_primo_img_day
    - piano_primo_img_night
    - tetto_img_day
    - tetto_img_night
  state_action:
    action: call-service
    service: floorplan.class_set
    service_data: >
      ${
        entity.state === element.getAttribute('data-mode')
          ? 'render-visible'
          : 'render-hidden'
      }

# LUCI (Elementi interattivi)
- name: Luci
  entities:
    - light.garage
    - light.taverna
    - light.bagno_taverna
    - light.lavanderia
    - light.locale_tecnico
    - light.vano_scale
    - light.segnapassi_scale
    - light.corridoio
    - light.camera_padronale
    - light.cabina_armadio
    - light.bagno_padronale
    - light.bagno_comune
    - light.camera_ospiti
    - light.studio
    - light.ripostiglio_pt
    - light.cucina
    - light.accento_cucina
    - light.soggiorno
    - light.bagno_p1
    - light.ripostiglio_p1
    - light.ingresso_principale
    - light.ingresso_seminterrato
    - light.perimetro_edificio
    - light.balcone_piano_terra
    - light.terrazzo_nord
    - light.terrazzo_sud
    - light.giardino
    - light.vialetto_pedonale
    - light.vialetto_carraio
    - light.cancelli
    - light.segnapassi_scale_esterne
  element: ${entity.entity_id.replace('.', '_')}
  tap_action: toggle
  state_action:
    action: call-service
    service: floorplan.dataset_set
    service_data:
      key: state
      value: ${entity.state}
