views:
  - title: Garage e Cancelli
    path: garage
    panel: true # Occupa tutta la pagina
    cards:
      - type: 'custom:floorplan-card'
        config:
          image: /local/home-floorplan/garage.svg
          stylesheet: /local/home-floorplan/floorplan.css

          # floorplan base url definition for relative paths in rules
          base_url: /local/home-floorplan/

          defaults:
            hover_action: hover-info
            tap_action: more-info

          rules:
            # - !include floorplan_rules.yaml

