# dashboards/floorplan_main.yaml
views:
  - title: Garage e Cancelli
    path: garage
    panel: true
    cards:
      - type: 'custom:floorplan-card'
        config:
          image: /local/home-floorplan/garage.svg
          stylesheet: /local/home-floorplan/floorplan.css
          vars:
            current_floor: "garage"
          rules: !include floorplan_rules.yaml

  - title: Seminterrato
