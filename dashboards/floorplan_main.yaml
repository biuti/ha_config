views:
  - title: Seminterrato
    path: seminterrato
    panel: true
    cards:
      - type: 'custom:floorplan-card'
        config:
          image: /local/home-floorplan/home.svg
          stylesheet: /local/home-floorplan/floorplan.css
          
          rules:
            - name: "Forza isolamento totale al boot"
              entities:
                - sun.sun
                - zone.home
              element:
                - layer_piano_terra
                - layer_piano_primo
                - layer_tetto
              state_action:
                action: call-service
                service: floorplan.class_set
                service_data: >
                  ${ console.log("LOG_OK") || "layer-hidden" }


