# dashboards/floorplan_main.yaml
views:
  - title: Seminterrato
    path: seminterrato
    panel: true
    cards:
      - type: 'custom:floorplan-card'
        config:
          image: /local/home-floorplan/home.svg
          stylesheet: /local/home-floorplan/floorplan.css
          config: /local/home-floorplan/floorplan_config.yaml
          vars:
            current_floor: "layer_seminterrato"

  - title: Piano Terra
    path: piano-terra
    panel: true
    cards:
      - type: 'custom:floorplan-card'
        config:
          image: /local/home-floorplan/home.svg
          stylesheet: /local/home-floorplan/floorplan.css
          config: /local/home-floorplan/floorplan_config.yaml
          vars:
            current_floor: "layer_piano_terra"

