# dashboards/floorplan_main.yaml
views:
  - title: Seminterrato
    path: seminterrato
    panel: true
    cards:
      - type: 'custom:floorplan-card'
        config:
          image: /local/home-floorplan/home.svg
          stylesheet: /local/home-floorplan/floorplan.css
          
          # Puntiamo al config nella cartella dashboards
          config: dashboards/floorplan_config.yaml
          
          vars:
            current_floor: "layer_seminterrato"
            
          # Regola esca nel MAIN per vedere se la card risponde
          rules:
            - name: "Esca Main"
              entities:
                - sun.sun
              element:
                - layer_seminterrato
              state_action:
                action: call-service
                service: floorplan.class_set
                service_data: ${ console.log("[1. MAIN CARD ALIVE] Lovelace sta leggendo floorplan_main.yaml") || "layer-visible" }


