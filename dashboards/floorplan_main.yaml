views:
  - title: Garage e Cancelli
    panel: true # Occupa tutta la pagina
    cards:
      - type: 'custom:floorplan-card'
        config:
          image: /local/home-floorplan/progetto_bosco_garage.svg
          stylesheet: /local/home-floorplan/floorplan.css

          # Imposta il viewBox per scalare correttamente l'SVG
          viewbox: "0 1860 1440 2215"

          # floorplan base url definition for relative paths in rules
          base_url: /local/home-floorplan/

          defaults:
            hover_action: hover-info
            tap_action: more-info

          rules:
            - name: Impostazione Visibilità Layer
              # Usiamo un'entità "finta" o sempre presente per attivare la regola all'avvio
              entities:
                - sensor.time 
              element:
                - layer_seminterrato
                - layer_piano_terra
                - layer_piano_primo
                - layer_tetto
              state_action:
                action: call-service
                service: floorplan.class_set
                service_data: >
                  ${ (elements.indexOf(element.id) === elements.indexOf('layer_seminterrato')) ? "layer-visible" : "layer-hidden" }

            - !include floorplan_rules.yaml

