# dashboards/floorplan_main.yaml
views:
  - title: Seminterrato
    path: seminterrato
    panel: true
    cards:
      - type: 'custom:floorplan-card'
        config:
          image: /local/home-floorplan/home.svg
          stylesheet: /local/home-floorplan/floorplan.css
          vars:
            current_floor: "seminterrato"
          rules: !include floorplan_rules.yaml

  - title: Piano Terra
    path: piano-terra
    panel: true
    cards:
      - type: 'custom:floorplan-card'
        config:
          image: /local/home-floorplan/home.svg
          stylesheet: /local/home-floorplan/floorplan.css
          vars:
            current_floor: "piano_terra"
          rules: !include floorplan_rules.yaml

  - title: Piano Primo
    path: piano-primo
    panel: true
    cards:
      - type: 'custom:floorplan-card'
        config:
          image: /local/home-floorplan/home.svg
          stylesheet: /local/home-floorplan/floorplan.css
          vars:
            current_floor: "piano-primo"
          rules: !include floorplan_rules.yaml

  - title: Tetto
    path: tetto
    panel: true
    cards:
      - type: 'custom:floorplan-card'
        config:
          image: /local/home-floorplan/home.svg
          stylesheet: /local/home-floorplan/floorplan.css
          vars:
            current_floor: "tetto"
          rules: !include floorplan_rules.yaml


