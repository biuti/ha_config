# packages/lighting/adaptive_lighting.yaml
# Configurazione centralizzata del ritmo circadiano per il Progetto Bosco

adaptive_lighting:
  - name: "Adaptive Lighting"
    lights:
      - light.luci_interne
    prefer_rgb_color: false
    transition: 60              # Transizione flemmatica (1 minuto) per non notare i cambi di stato
    initial_transition: 0       # FONDAMENTALE: 0 secondi all'accensione per azzerare l'effetlo flash
    interval: 300               # Controlla e corregge ogni 5 minut (evita il flood ZigBee)
    min_brightness: 1           # Minimo notturno
    max_brightness: 100         # Massimo diurno
    min_color_temp: 2200        # [CORRETTO] Sostituisce 450 mired (luce caldissima sera)
    max_color_temp: 4000        # [CORRETTO] Sostituisce 250 mired (luce bianca giorno)
    sleep_brightness: 5         # Luminosità ridotta quando la Sleep Mode è attiva
    sleep_color_temp: 2000      # [CORRETTO] Sostituisce 500 mired (effetto candela notturno)