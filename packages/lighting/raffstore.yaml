# packages/lighting/raffstore.yaml
# Raffstore Hella AR92 motorizzati
# Simulati con input_boolean (su/giù) e input_number (posizione %)
# Convenzione: raffstore_ per tutti, posizione in 0-100 (0=chiuso, 100=aperto)
# Nota: quando arrivano i dispositivi fisici, ogni coppia input_boolean+input_number
# viene sostituita da una singola entità cover.raffstore_* via Zigbee2MQTT

input_boolean:

  # ── SEMINTERRATO ──────────────────────────────────────────
  raffstore_pf_taverna:
    name: "Raffstore Portafinestra Taverna"
    icon: mdi:blinds

  raffstore_fin_bagno_taverna:
    name: "Raffstore Finestra Bagno Taverna"
    icon: mdi:blinds

  # ── VANO SCALE ────────────────────────────────────────────
  raffstore_fin_vano_scale_pt:
    name: "Raffstore Finestra Vano Scale Piano Terra"
    icon: mdi:blinds

  raffstore_fin_vano_scale_p1:
    name: "Raffstore Finestra Vano Scale Piano Primo"
    icon: mdi:blinds

  # ── PIANO TERRA ───────────────────────────────────────────
  raffstore_pf_camera_padronale:
    name: "Raffstore Portafinestra Camera Padronale"
    icon: mdi:blinds

  raffstore_fin_bagno_padronale:
    name: "Raffstore Finestra Bagno Padronale"
    icon: mdi:blinds

  raffstore_fin_bagno_comune:
    name: "Raffstore Finestra Bagno Comune"
    icon: mdi:blinds

  raffstore_fin_studio:
    name: "Raffstore Finestra Studio"
    icon: mdi:blinds

  raffstore_pf_camera_ospiti:
    name: "Raffstore Portafinestra Camera Ospiti"
    icon: mdi:blinds

  # ── PIANO PRIMO ───────────────────────────────────────────
  raffstore_pf_soggiorno:
    name: "Raffstore Portafinestra Soggiorno"
    icon: mdi:blinds

  raffstore_fin_soggiorno_ovest:
    name: "Raffstore Finestra Soggiorno Ovest"
    icon: mdi:blinds

  raffstore_fin_soggiorno_est:
    name: "Raffstore Finestra Soggiorno Est"
    icon: mdi:blinds

  raffstore_pf_ingresso_terrazzo:
    name: "Raffstore Portafinestra Ingresso Terrazzo"
    icon: mdi:blinds

  raffstore_fin_cucina:
    name: "Raffstore Finestra Cucina"
    icon: mdi:blinds

  raffstore_fin_bagno_p1:
    name: "Raffstore Finestra Bagno Piano Primo"
    icon: mdi:blinds

