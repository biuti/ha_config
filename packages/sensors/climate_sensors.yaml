# packages/sensors/climate_sensors.yaml
# Sensori temperatura e umidità per stanza
# Simulati con input_number in attesa dei sensori ZigBee fisici

input_number:

  # Piano Primo
  temp_soggiorno:
    name: "Temperatura Soggiorno"
    min: -10
    max: 50
    step: 0.1
    unit_of_measurement: "°C"
    icon: mdi:thermometer

  humidity_soggiorno:
    name: "Umidità Soggiorno"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:water-percent

