# packages/groups/light_groups.yaml
# Gruppi luci per zona e funzione
# STATO: quasi definitivo — a casa ultimata sostituire light.* virtuali
# con i dispositivi fisici ZigBee esposti da Zigbee2MQTT
#
# Gerarchia:
#   light.tutte_le_luci
#   ├── light.luci_interne
#   │   ├── light.luci_zona_giorno (soggiorno, cucina, ingresso)
#   │   ├── light.luci_zone_notte (camere, taverna)
#   │   ├── light.luci_bagni
#   │   ├── light.luci_servizio (ripostigli, lavanderia, locale tecnico, garage)
#   │   └── light.luci_vano_scale
#   ├── light.luci_esterne
#   │   ├── light.luci_terrazzi_balcone
#   │   ├── light.luci_giardino
#   │   └── light.luci_perimetro
#   ├── light.luci_segnapassi
#   └── light.luci_accento

light:
  # ── GRUPPO PRINCIPALE ─────────────────────────────────────
  - platform: group
    unique_id: group_tutte_le_luci
    name: "Tutte le Luci"
    entities:
      - light.luci_interne
      - light.luci_esterne
      - light.luci_segnapassi
      - light.luci_accento

  # ── LUCI INTERNE ──────────────────────────────────────────
  - platform: group
    unique_id: group_luci_interne
    name: "Luci Interne"
    entities:
      - light.luci_zona_giorno
      - light.luci_zone_notte
      - light.luci_bagni
      - light.luci_servizio
      - light.luci_vano_scale

  - platform: group
    unique_id: group_luci_zona_giorno
    name: "Luci Zona Giorno"
    entities:
      - light.soggiorno
      - light.cucina

  - platform: group
    unique_id: group_luci_zone_notte
    name: "Luci Zone Notte"
    entities:
      - light.camera_padronale
      - light.camera_ospiti
      - light.taverna

  - platform: group
    unique_id: group_luci_bagni
    name: "Luci Bagni"
    entities:
      - light.bagno_padronale
      - light.bagno_comune
      - light.bagno_taverna
      - light.bagno_p1

  - platform: group
    unique_id: group_luci_servizio
    name: "Luci Servizio"
    entities:
      - light.ripostiglio_pt
      - light.ripostiglio_p1
      - light.lavanderia
      - light.locale_tecnico
      - light.garage

  - platform: group
    unique_id: group_luci_vano_scale
    name: "Luci Vano Scale"
    entities:
      - light.vano_scale
      - light.corridoio

  # ── LUCI ESTERNE ──────────────────────────────────────────
  - platform: group
    unique_id: group_luci_esterne
    name: "Luci Esterne"
    entities:
      - light.luci_terrazzi_balcone
      - light.giardino
      - light.perimetro_edificio

  - platform: group
    unique_id: group_luci_terrazzi_balcone
    name: "Luci Terrazzi e Balcone"
    entities:
      - light.terrazzo_nord
      - light.terrazzo_sud
      - light.balcone_piano_terra

  - platform: group
    unique_id: group_luci_giardino
    name: "Luci Giardino"
    entities:
      - light.giardino
      - light.vialetto_pedonale
      - light.vialetto_carraio

  - platform: group
    unique_id: group_luci_perimetro
    name: "Luci Perimetro"
    entities:
      - light.perimetro_edificio
      - light.ingresso_principale
      - light.ingresso_seminterrato

  # ── LUCI SEGNAPASSI ───────────────────────────────────────
  - platform: group
    unique_id: group_luci_segnapassi
    name: "Luci Segnapassi"
    entities:
      - light.segnapassi_scale
      - light.segnapassi_scale_esterno

  # ── LUCI ACCENTO ──────────────────────────────────────────
  - platform: group
    unique_id: group_luci_accento
    name: "Luci Accento"
    entities:
      - light.accento_cucina
      # future luci accento: soggiorno, camera padronale, ecc.