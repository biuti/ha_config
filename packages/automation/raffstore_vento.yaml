# packages/automation/raffstore_vento.yaml
# Automazioni raffstore — gestione vento
# Dipendenze:
#   - input_number.velocita_vento (templates/environment_virtual.yaml)
#   - input_number.soglia_vento_raffstore (templates/environment_virtual.yaml)
#   - input_boolean.override_vento_raffstore (templates/environment_virtual.yaml)
#   - input_boolean.crepuscolare (templates/environment_virtual.yaml)
#   - input_boolean.pf_* (templates/security_sensors_virtual.yaml)
#   - cover.tutti_i_raffstore (groups/raffstore_groups.yaml)

automation:

  - id: raffstore_vento_chiudi_lamelle
    alias: "Raffstore — Vento: chiudi lamelle"
    description: >
      Vento > soglia + finestra aperta → chiudi lamelle per proteggere la privacy.
      Attiva override vento per evitare che ACP riapra i raffstore.
    triggers:
      - trigger: template
        value_template: >
          {{ states('input_number.velocita_vento') | float >
             states('input_number.soglia_vento_raffstore') | float }}
    conditions:
      - condition: template
        value_template: >
          {{ states('input_select.modalita_casa') != 'Vacanza' }}
    actions:
      - action: cover.set_cover_position
        target:
          entity_id: >
            {{ states.cover
               | selectattr('entity_id', 'in',
                   state_attr('cover.tutti_i_raffstore', 'entity_id'))
               | selectattr('attributes.current_position', 'lt', 100)
               | selectattr('attributes.current_position', 'gt', 0)
               | rejectattr('entity_id', 'in',
                   label_entities('portafinestra_esterna')
                   | map('replace', 'input_boolean.', 'cover.raffstore_')
                   | select('is_state', 'open') | list)
               | map(attribute='entity_id') | list }}
        data:
          position: 0
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.override_vento_raffstore
    mode: single

  - id: raffstore_vento_alza_giorno
    alias: "Raffstore — Vento: alza completamente (giorno)"
    description: >
      Vento cessato + giorno → alza completamente i raffstore.
      Rilascia override vento per permettere ad ACP di riprendere il controllo.
       Se è notte, invece, li alza ma li lascia chiusi per proteggere la privacy.
    triggers:
      - trigger: template
        value_template: >
          {{ states('input_number.velocita_vento') | float >
             states('input_number.soglia_vento_raffstore') | float }}
    conditions:
      - condition: state
        entity_id: input_boolean.crepuscolare
        state: "off"
      - condition: template
        value_template: >
          {{ states('input_select.modalita_casa') != 'Vacanza' }}
    actions:
      - action: script.raffstore_mattina
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.override_vento_raffstore
    mode: single

  - id: raffstore_vento_abbassa_notte
    alias: "Raffstore — Vento: abbassa completamente (notte)"
    description: >
      Vento cessato + notte → alza completamente i raffstore ma li lascia chiusi
      per proteggere la privacy. Rilascia override vento per permettere ad ACP di riprendere il controllo.
    triggers:
      - trigger: template
        value_template: >
          {{ states('input_number.velocita_vento') | float >
             states('input_number.soglia_vento_raffstore') | float }}
    conditions:
      - condition: state
        entity_id: input_boolean.crepuscolare
        state: "on"
      - condition: template
        value_template: >
          {{ states('input_select.modalita_casa') != 'Vacanza' }}
    actions:
      - action: script.raffstore_sigillati
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.override_vento_raffstore
    mode: single

  - id: raffstore_vento_cessato
    alias: "Raffstore — Vento cessato: rilascia override"
    description: >
      Quando il vento scende sotto la soglia configurata, rilascia l'override
      per permettere ad ACP di riprendere il controllo dei raffstore.
    triggers:
      - trigger: template
        value_template: >
          {{ states('input_number.velocita_vento') | float <=
             states('input_number.soglia_vento_raffstore') | float }}
    conditions:
      - condition: state
        entity_id: input_boolean.override_vento_raffstore
        state: "on"
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.override_vento_raffstore
    mode: single