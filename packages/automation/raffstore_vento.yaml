# packages/automation/raffstore_vento.yaml
# Automazioni raffstore — gestione vento
# Dipendenze:
#   - input_number.velocita_vento (templates/environment_virtual.yaml)
#   - input_number.soglia_vento_raffstore (templates/environment_virtual.yaml)
#   - input_boolean.override_vento_raffstore (templates/environment_virtual.yaml)
#   - input_boolean.crepuscolare (templates/environment_virtual.yaml)
#   - input_boolean.pf_* (templates/security_sensors_virtual.yaml)
#   - cover.tutti_i_raffstore (groups/raffstore_groups.yaml)

automation:

  - id: raffstore_vento_chiudi_lamelle
    alias: "Raffstore — Vento: chiudi lamelle"
    description: >
      Vento > soglia + raffstore parzialmente abbassata + finestra chiusa
      → chiude le lamelle. Non agisce se finestra aperta o modalità Vacanza.
    trigger:
      - platform: template
        value_template: >
          {{ states('input_number.velocita_vento') | float >
             states('input_number.soglia_vento_raffstore') | float }}
    condition:
      - condition: template
        value_template: >
          {{ states('input_select.modalita_casa') != 'Vacanza' }}
    action:
      - service: cover.set_cover_position
        target:
          entity_id: >
            {{ states.cover
               | selectattr('entity_id', 'in', state_attr('cover.tutti_i_raffstore', 'entity_id'))
               | selectattr('attributes.current_position', 'lt', 100)
               | selectattr('attributes.current_position', 'gt', 0)
               | rejectattr('entity_id', 'in',
                   ['cover.raffstore_pf_taverna' if is_state('input_boolean.pf_taverna', 'on') else '',
                    'cover.raffstore_fin_bagno_taverna' if is_state('input_boolean.fin_bagno_taverna', 'on') else '',
                    'cover.raffstore_pf_camera_padronale' if is_state('input_boolean.pf_camera_padronale', 'on') else '',
                    'cover.raffstore_pf_camera_ospiti' if is_state('input_boolean.pf_camera_ospiti', 'on') else '',
                    'cover.raffstore_pf_soggiorno' if is_state('input_boolean.pf_soggiorno', 'on') else '',
                    'cover.raffstore_pf_ingresso_terrazzo' if is_state('input_boolean.pf_ingresso_terrazzo', 'on') else ''])
               | map(attribute='entity_id') | list }}
        data:
          position: 0
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.override_vento_raffstore
    mode: single

  - id: raffstore_vento_alza_giorno
    alias: "Raffstore — Vento: alza completamente (giorno)"
    description: >
      Vento > soglia + è giorno + finestra chiusa → alza completamente
      per evitare danni meccanici. Attiva override vento.
    trigger:
      - platform: template
        value_template: >
          {{ states('input_number.velocita_vento') | float >
             states('input_number.soglia_vento_raffstore') | float }}
    condition:
      - condition: state
        entity_id: input_boolean.crepuscolare
        state: "off"
      - condition: template
        value_template: >
          {{ states('input_select.modalita_casa') != 'Vacanza' }}
    action:
      - service: cover.open_cover
        target:
          entity_id: cover.tutti_i_raffstore
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.override_vento_raffstore
    mode: single

  - id: raffstore_vento_abbassa_notte
    alias: "Raffstore — Vento: abbassa completamente (notte)"
    description: >
      Vento > soglia + è notte + finestra chiusa → abbassa completamente.
      Attiva override vento.
    trigger:
      - platform: template
        value_template: >
          {{ states('input_number.velocita_vento') | float >
             states('input_number.soglia_vento_raffstore') | float }}
    condition:
      - condition: state
        entity_id: input_boolean.crepuscolare
        state: "on"
      - condition: template
        value_template: >
          {{ states('input_select.modalita_casa') != 'Vacanza' }}
    action:
      - service: cover.close_cover
        target:
          entity_id: cover.tutti_i_raffstore
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.override_vento_raffstore
    mode: single

  - id: raffstore_vento_cessato
    alias: "Raffstore — Vento cessato: rilascia override"
    description: >
      Quando il vento scende sotto la soglia, rilascia il force override
      così ACP può riprendere il controllo dei raffstore.
    trigger:
      - platform: template
        value_template: >
          {{ states('input_number.velocita_vento') | float <=
             states('input_number.soglia_vento_raffstore') | float }}
    condition:
      - condition: state
        entity_id: input_boolean.override_vento_raffstore
        state: "on"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.override_vento_raffstore
    mode: single