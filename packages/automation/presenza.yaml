# packages/automation/presenza.yaml
# Gestione automatica della modalità casa basata su presenza
#
# PREREQUISITI:
#   - App HA Companion installata su iPhone Antonio e iPhone Nicoletta
#   - Entità person.antonio_golfari e person.nicoletta_orsenigo create in HA
#   - Zone "nearby" creata in HA (raggio ~5km da casa)
#
# LOGICA:
#   person.* = home → Casa
#   tutti away + almeno uno nearby → Fuori Casa (con timer rientro)
#   tutti away + nessuno nearby → Fuori Casa
#   tutti away per > 24h → notifica per confermare Vacanza
#
# NOTA: la modalità Vacanza non viene mai attivata automaticamente
#   — richiede sempre conferma manuale per evitare falsi positivi

input_number:
  raggio_nearby:
    name: "Soglia Distanza Nearby"
    initial: 5.0
    min: 1.0
    max: 10.0
    step: 0.5
    unit_of_measurement: "km"
    icon: mdi:map-marker-distance

  raggio_far_away:
    name: "Soglia Distanza Far Away"
    initial: 150.0
    min: 10.0
    max: 200.0
    step: 10.0
    unit_of_measurement: "km"
    icon: mdi:airplane

automation:

  # ── ARRIVO A CASA ─────────────────────────────────────────
  - id: presenza_arrivo_casa
    alias: "Presenza — Arrivo a casa"
    description: >
      Quando almeno una persona arriva a casa (zone: home),
      e la modalità casa è Fuori Casa o Vacanza, attiva scenario rientro.
      Non agisce se già in modalità Casa o Ospiti.
    triggers:
      - trigger: state
        entity_id: group.residenti
        to: "home"
    conditions:
      - condition: template
        value_template: >
          {{ states('input_select.modalita_casa') in ['Fuori Casa', 'Vacanza'] }}
    actions:
      - action: input_select.select_option
        target:
          entity_id: input_select.modalita_casa
        data:
          option: "Casa"
    mode: single

  # ── USCITA DA CASA ────────────────────────────────────────

  - id: presenza_uscita_casa
    alias: "Presenza — Uscita da casa"
    description: >
      Quando tutte le persone tracciate sono not_home,
      e nessun ospite è presente, passa a modalità Fuori Casa.
      Attende 5 minuti prima di agire (evita falsi positivi
      per brevi disconnessioni GPS).
    triggers:
      - trigger: state
        entity_id: binary_sensor.nessuno_nearby
        to: "on"
        for:
          minutes: 5
    conditions:
      - condition: state
        entity_id: input_boolean.ospiti_presenti
        state: "off"
      - condition: state
        entity_id: input_select.modalita_casa
        state: "Casa"
    actions:
      - action: input_select.select_option
        target:
          entity_id: input_select.modalita_casa
        data:
          option: "Fuori Casa"
      - action: notify.notify
        data:
          title: "🏠 Progetto Bosco"
          message: "Tutti i residenti hanno superato i {{ states('input_number.raggio_nearby') | int }} km. Modalità Fuori Casa attivata."

  # ── AGGIORNAMENTO PRESENZA INDIVIDUALE ────────────────────

  - id: presenza_aggiorna_antonio
    alias: "Presenza — Aggiorna Antonio"
    description: >
      Mantiene input_boolean.presenza_antonio sincronizzato
      con person.antonio_golfari per le automazioni che lo usano.
    triggers:
      - trigger: state
        entity_id: person.antonio_golfari
    actions:
      - choose:
          - conditions:
              - condition: state
                entity_id: person.antonio_golfari
                state: "home"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.presenza_antonio
          - conditions:
              - condition: template
                value_template: >
                  {{ states('person.antonio_golfari') != 'home' }}
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.presenza_antonio
    mode: single

  - id: presenza_aggiorna_nicoletta
    alias: "Presenza — Aggiorna Nicoletta"
    triggers:
      - trigger: state
        entity_id: person.nicoletta_orsenigo
    actions:
      - choose:
          - conditions:
              - condition: state
                entity_id: person.nicoletta_orsenigo
                state: "home"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.presenza_nicoletta
          - conditions:
              - condition: template
                value_template: >
                  {{ states('person.nicoletta_orsenigo') != 'home' }}
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.presenza_nicoletta
    mode: single

  # ── SUGGERIMENTO VACANZA ──────────────────────────────────

  - id: presenza_suggerisci_vacanza
    alias: "Presenza — Suggerisci modalità Vacanza"
    description: >
      Se entrambi sono assenti da più di 24 ore e la modalità
      è ancora Fuori Casa, invia una notifica per confermare Vacanza.
      La modalità Vacanza NON si attiva automaticamente.
    triggers:
      - trigger: state
        entity_id: binary_sensor.pronti_per_vacanza
        to: "on"
    conditions:
      - condition: state
        entity_id: input_select.modalita_casa
        state: "Fuori Casa"
    actions:
      - action: persistent_notification.create
        data:
          title: "🏖️ Sei in vacanza?"
          message: >
            Siete fuori casa da più di 24 ore.
            Vuoi attivare la modalità Vacanza per massimizzare
            sicurezza e risparmio energetico?
          notification_id: "suggerisci_vacanza"
    mode: single

  # ── SUGGERIMENTO RIENTRO ──────────────────────────────────

  - id: presenza_suggerisci_rientro
    alias: "Presenza — Suggerisci modalità Fuori Casa"
    description: >
      Se la modalità attiva è Vacanza, e qualcuno che era fuori da far_away rientra,
      invia una notifica per confermare che si sta rientrando per attivare modalità Fuori Casa.
      La modalità Fuori Casa NON si attiva automaticamente.
    triggers:
      - trigger: state
        entity_id: binary_sensor.pronti_per_vacanza
        to: "off"
    conditions:
      - condition: state
        entity_id: input_select.modalita_casa
        state: "Vacanza"
    actions:
      - action: persistent_notification.create
        data:
          title: "Stai rientrando?"
          message: >
            Sembra che state rientrando a casa.
            Vuoi attivare la modalità Fuori Casa per aumentare
            il comfort al vostro rientro?
          notification_id: "suggerisci_fuori_casa"
    mode: single

  # ── OSPITI ────────────────────────────────────────────────

  - id: presenza_ospiti_attivi
    alias: "Presenza — Ospiti: mantieni modalità Casa"
    description: >
      Se ospiti_presenti è attivo e la modalità passa a Fuori Casa,
      ripristina Casa. Gli ospiti garantiscono la presenza in casa.
    triggers:
      - trigger: state
        entity_id: input_select.modalita_casa
        to: "Fuori Casa"
    conditions:
      - condition: state
        entity_id: input_boolean.ospiti_presenti
        state: "on"
    actions:
      - action: input_select.select_option
        target:
          entity_id: input_select.modalita_casa
        data:
          option: "Ospiti"
    mode: single