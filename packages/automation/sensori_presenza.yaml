# packages/automation/presenza_sensori.yaml
# Sensori logici di supporto per il calcolo della modalità Vacanza

template:
  - binary_sensor:
      # ── LOGICA VACANZA ANTONIO ──────────────────────────────
      - name: "Status Vacanza Antonio"
        id: status_vacanza_antonio
        state: >
          {{ states('person.antonio_golfari') == 'far_away' 
             or (states('person.antonio_golfari') != 'home' and (as_timestamp(now()) - as_timestamp(states.person.antonio_golfari.last_changed | default(now()))) > 86400) }}
        icon: mdi:account-question

      # ── LOGICA VACANZA NICOLETTA ────────────────────────────
      - name: "Status Vacanza Nicoletta"
        id: status_vacanza_nicoletta
        state: >
          {{ states('person.nicoletta_orsenigo') == 'far_away' 
             or (states('person.nicoletta_orsenigo') != 'home' and (as_timestamp(now()) - as_timestamp(states.person.nicoletta_orsenigo.last_changed | default(now()))) > 86400) }}
        icon: mdi:account-question

      # ── SENSORE MASTER (Entrambi lontani) ──────
      - name: "Pronti per Modalità Vacanza"
        id: pronti_per_vacanza
        state: >
          {{ is_state('binary_sensor.status_vacanza_antonio', 'on') 
             and is_state('binary_sensor.status_vacanza_nicoletta', 'on') }}
        icon: mdi:suitcase