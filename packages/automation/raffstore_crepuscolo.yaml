# packages/automation/raffstore_crepuscolo.yaml
# Automazioni raffstore — crepuscolo e alba
# Dipendenze:
#   - cover.raffstore_crepuscolo (groups/raffstore_groups.yaml)
#   - cover.raffstore_mattina (groups/raffstore_groups.yaml)
#   - cover.raffstore_sveglia (groups/raffstore_groups.yaml)
#   - input_boolean.crepuscolare (templates/environment_virtual.yaml)
#   - input_select.modalita_casa (templates/presence_virtual.yaml)
#   - input_datetime.ora_inizio_notte (templates/presence_virtual.yaml)
#   - input_datetime.ora_fine_notte (templates/presence_virtual.yaml)
# Nota: quando arriva il sensore crepuscolare fisico ZigBee,
#   sostituire input_boolean.crepuscolare con il sensore reale

automation:

  # ── 1. TRAMONTO: abbassa gruppo crepuscolo ─────────────────
  - id: raffstore_tramonto
    alias: "Raffstore — Tramonto: abbassa"
    description: >
      Al tramonto abbassa tutti i raffstore del gruppo crepuscolo,
      escluse le panoramiche. Non agisce se la finestra è aperta
      o se è attiva la modalità Vacanza.
    trigger:
      - platform: state
        entity_id: input_boolean.crepuscolare
        to: "on"
    condition:
      - condition: template
        value_template: >
          {{ states('input_select.modalita_casa') != 'Vacanza' }}
    action:
      - service: cover.close_cover
        target:
          entity_id: cover.raffstore_crepuscolo
    mode: single

  # ── 2. ALBA: alza gruppo mattina ───────────────────────────
  - id: raffstore_alba_mattina
    alias: "Raffstore — Alba: alza gruppo mattina"
    description: >
      All'alba alza i raffstore del gruppo mattina (escluse camere
      e taverna che aspettano la sveglia). Non agisce in modalità
      Vacanza o Notte attiva.
    trigger:
      - platform: state
        entity_id: input_boolean.crepuscolare
        to: "off"
    condition:
      - condition: template
        value_template: >
          {{ states('input_select.modalita_casa') != 'Vacanza' }}
      - condition: state
        entity_id: input_boolean.modalita_notte_attiva
        state: "off"
    action:
      - service: cover.open_cover
        target:
          entity_id: cover.raffstore_mattina
    mode: single

  # ── 3. SVEGLIA: alza camere e taverna ─────────────────────
  - id: raffstore_sveglia
    alias: "Raffstore — Sveglia: alza camere e taverna"
    description: >
      All'ora configurata come fine notte, alza i raffstore delle
      camere e della taverna. Non agisce in modalità Vacanza.
      In modalità Via non agisce (nessuno da svegliare).
    trigger:
      - platform: time
        at: input_datetime.ora_fine_notte
    condition:
      - condition: template
        value_template: >
          {{ states('input_select.modalita_casa') not in ['Vacanza', 'Via'] }}
    action:
      - service: cover.open_cover
        target:
          entity_id: cover.raffstore_sveglia
    mode: single

  # ── 4. MODALITÀ NOTTE: abbassa gruppo crepuscolo ──────────
  - id: raffstore_notte
    alias: "Raffstore — Modalità Notte: abbassa"
    description: >
      Quando si attiva la modalità notte manualmente (prima del
      tramonto naturale), abbassa i raffstore del gruppo crepuscolo.
      Utile per pisolini, blackout, o andare a letto prima del tramonto.
    trigger:
      - platform: state
        entity_id: input_boolean.modalita_notte_attiva
        to: "on"
    condition:
      - condition: template
        value_template: >
          {{ states('input_select.modalita_casa') != 'Vacanza' }}
      - condition: state
        entity_id: input_boolean.crepuscolare
        state: "off"
    action:
      - service: cover.close_cover
        target:
          entity_id: cover.raffstore_crepuscolo
    mode: single

  # ── 5. MODALITÀ VIA: abbassa tutto ────────────────────────
  - id: raffstore_via
    alias: "Raffstore — Modalità Via: abbassa tutto"
    description: >
      Quando tutti escono (modalità Via), abbassa tutti i raffstore
      incluse le panoramiche. Sicurezza + isolamento termico.
      Esclusa la logica finestre aperte — se esci con una finestra
      aperta è un tuo problema, non della domotica.
    trigger:
      - platform: state
        entity_id: input_select.modalita_casa
        to: "Via"
    action:
      - service: cover.close_cover
        target:
          entity_id: cover.tutti_i_raffstore
    mode: single

  # ── 6. RIENTRO A CASA: ripristina in base all'ora ─────────
  - id: raffstore_rientro
    alias: "Raffstore — Rientro: ripristina"
    description: >
      Quando si rientra a casa (da Via a qualsiasi altra modalità),
      alza i raffstore se è giorno, li lascia abbassati se è notte.
      Non agisce in modalità Vacanza.
    trigger:
      - platform: state
        entity_id: input_select.modalita_casa
        from: "Via"
    condition:
      - condition: template
        value_template: >
          {{ states('input_select.modalita_casa') != 'Vacanza' }}
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.crepuscolare
                state: "off"
            sequence:
              - service: cover.open_cover
                target:
                  entity_id: cover.raffstore_mattina
          - conditions:
              - condition: state
                entity_id: input_boolean.crepuscolare
                state: "on"
            sequence:
              - service: cover.close_cover
                target:
                  entity_id: cover.raffstore_crepuscolo
    mode: single