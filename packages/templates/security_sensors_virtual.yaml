  serranda_garage_ovest_stato:
    name: "Serranda Garage Ovest (stato)"
    icon: mdi:garage

  fumo_garage:
    name: "Fumo Garage"
    icon: mdi:smoke-detector

  # ── SEMINTERRATO ──────────────────────────────────────────
