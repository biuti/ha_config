# packages/templates/light_virtual.yaml
# TEMPORANEO — Template light che wrappano gli input_boolean virtuali
# Espongono entità light.* per compatibilità con floorplan e automazioni
# A casa ultimata: rimuovere questo file
# I dispositivi ZigBee si espongono direttamente come light.* con gli stessi entity_id
#
# Convenzione unique_id: corrisponde al suffisso dell'entity_id
# es. unique_id: taverna → light.luce_taverna

template:
  - light:

    # ── GARAGE ──────────────────────────────────────────────
    - name: "Luce Garage"
      unique_id: garage
      state: "{{ states('input_boolean.luce_garage') }}"
      turn_on:
        action: input_boolean.turn_on
        target:
          entity_id: input_boolean.luce_garage
      turn_off:
        action: input_boolean.turn_off
        target:
          entity_id: input_boolean.luce_garage

    # ── SEMINTERRATO ────────────────────────────────────────
