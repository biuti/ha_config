# TEMPORANEO — simulazione virtuale in attesa dell'hardware fisico
# Rimuovere questo file quando il dispositivo reale è installato

# packages/water/water.yaml
# Impianto idraulico: autoclave, bollitore ACS, vasche raccolta piovana
# Dispositivi simulati in attesa dell'hardware fisico

input_boolean:

  # ── AUTOCLAVE ─────────────────────────────────────────────
  autoclave_attiva:
    name: "Autoclave Attiva"
    icon: mdi:pump

  # ── BOLLITORE ACS — Panasonic PAW-TD30C1E5-1 ─────────────
  bollitore_on:
    name: "Bollitore ACS Acceso"
    icon: mdi:water-boiler

  # ── VASCA 1 — irrigazione ─────────────────────────────────
  rubinetto_ripristino_vasca1:
    name: "Rubinetto Ripristino Vasca 1"
    icon: mdi:valve

  # ── VASCA 2 — scarichi sanitari ───────────────────────────
  rubinetto_ripristino_vasca2:
    name: "Rubinetto Ripristino Vasca 2"
    icon: mdi:valve

input_number:

  # ── BOLLITORE ACS ─────────────────────────────────────────
  temp_bollitore:
    name: "Temperatura Bollitore ACS"
    min: 0
    max: 90
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer

  temp_target_bollitore:
    name: "Temperatura Target Bollitore ACS"
    min: 40
    max: 80
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:thermometer-check

  # ── VASCA 1 — irrigazione ─────────────────────────────────
  livello_vasca1:
    name: "Livello Vasca 1 (irrigazione)"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:gauge

  soglia_ripristino_vasca1:
    name: "Soglia Ripristino Vasca 1"
    min: 0
    max: 50
    step: 5
    unit_of_measurement: "%"
    icon: mdi:gauge-low

  # ── VASCA 2 — scarichi sanitari ───────────────────────────
  livello_vasca2:
    name: "Livello Vasca 2 (sanitari)"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:gauge

  soglia_ripristino_vasca2:
    name: "Soglia Ripristino Vasca 2"
    min: 0
    max: 50
    step: 5
    unit_of_measurement: "%"
    icon: mdi:gauge-low