    name: "Raffstore Portafinestra Camera Padronale"
    icon: mdi:blinds

  raffstore_fin_bagno_padronale:
    name: "Raffstore Finestra Bagno Padronale"
    icon: mdi:blinds

  raffstore_fin_bagno_comune:
    name: "Raffstore Finestra Bagno Comune"
    icon: mdi:blinds

  raffstore_fin_studio:
    name: "Raffstore Finestra Studio"
    icon: mdi:blinds

  raffstore_pf_camera_ospiti:
    name: "Raffstore Portafinestra Camera Ospiti"
    icon: mdi:blinds

  # ── PIANO PRIMO ───────────────────────────────────────────
  raffstore_pf_soggiorno:
    name: "Raffstore Portafinestra Soggiorno"
    icon: mdi:blinds

  raffstore_fin_soggiorno_ovest:
    name: "Raffstore Finestra Soggiorno Ovest"
    icon: mdi:blinds

  raffstore_fin_soggiorno_est:
    name: "Raffstore Finestra Soggiorno Est"
    icon: mdi:blinds

  raffstore_pf_cucina:
    name: "Raffstore Portafinestra Cucina"
    icon: mdi:blinds

  raffstore_fin_cucina:
    name: "Raffstore Finestra Cucina"
    icon: mdi:blinds

  raffstore_fin_bagno_p1:
    name: "Raffstore Finestra Bagno Piano Primo"
    icon: mdi:blinds

