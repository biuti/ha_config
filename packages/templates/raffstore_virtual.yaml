cover:
  - platform: template
    covers:

      raffstore_pf_taverna:
        friendly_name: "Raffstore Portafinestra Taverna"
        position_template: >
          {{ states('input_number.pos_raffstore_pf_taverna') | int }}
        open_cover:
          service: input_number.set_value
          target:
            entity_id: input_number.pos_raffstore_pf_taverna
          data:
            value: 100
        close_cover:
          service: input_number.set_value
          target:
            entity_id: input_number.pos_raffstore_pf_taverna
          data:
            value: 0
        set_cover_position:
          service: input_number.set_value
          target:
            entity_id: input_number.pos_raffstore_pf_taverna
          data:
            value: "{{ position }}"
        stop_cover:
          service: input_boolean.turn_off
          target:
            entity_id: input_boolean.raffstore_pf_taverna

