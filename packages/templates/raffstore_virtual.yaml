template:
  - cover:
      - name: "Raffstore Portafinestra Taverna"
        unique_id: raffstore_pf_taverna
        position: "{{ states('input_number.pos_raffstore_pf_taverna') | int }}"
        open_cover:
          - action: input_number.set_value
            target:
              entity_id: input_number.pos_raffstore_pf_taverna
            data:
              value: 100
        close_cover:
          - action: input_number.set_value
            target:
              entity_id: input_number.pos_raffstore_pf_taverna
            data:
              value: 0
        set_cover_position:
          - action: input_number.set_value
            target:
              entity_id: input_number.pos_raffstore_pf_taverna
            data:
              value: "{{ position }}"
        stop_cover:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.raffstore_pf_taverna

      - name: "Raffstore Finestra Bagno Taverna"
