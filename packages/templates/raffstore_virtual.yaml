# TEMPORANEO — simulazione virtuale in attesa dell'hardware fisico
# Rimuovere questo file quando il dispositivo reale è installato

# packages/lighting/raffstore.yaml
# Raffstore Hella AR92 motorizzati
# Simulati con input_boolean (su/giù) e input_number (posizione %)
# Convenzione: raffstore_ per tutti, posizione in 0-100 (0=chiuso, 100=aperto)

# Contiene: dati grezzi (input_boolean + input_number) e cover template
# Quando installati i dispositivi fisici:
#   1. Eliminare questo file
#   2. Aggiornare groups/raffstore_groups.yaml con i cover fisici Zigbee2MQTT
#   3. Le automazioni in automation/raffstore_vento.yaml non cambiano

input_boolean:

  # ── SEMINTERRATO ──────────────────────────────────────────
  raffstore_pf_taverna:
    name: "Raffstore Portafinestra Taverna"
    icon: mdi:blinds

  raffstore_fin_bagno_taverna:
    name: "Raffstore Finestra Bagno Taverna"
    icon: mdi:blinds

  # ── VANO SCALE ────────────────────────────────────────────
