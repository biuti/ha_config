    name: "Raffstore Finestra Bagno Comune"
    icon: mdi:blinds

  raffstore_fin_studio:
    name: "Raffstore Finestra Studio"
    icon: mdi:blinds

  raffstore_pf_camera_ospiti:
    name: "Raffstore Portafinestra Camera Ospiti"
    icon: mdi:blinds

  # ── PIANO PRIMO ───────────────────────────────────────────
